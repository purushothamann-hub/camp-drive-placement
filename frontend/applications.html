<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Applications | Campus Placement Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <script src="js/auth-guard.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#0F172A',
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-[#F8FAFC]">
    <!-- Mobile Bottom Nav -->
    <nav class="md:hidden fixed bottom-0 left-0 w-full z-50 bg-white border-t border-slate-200 flex justify-around p-3">
        <a href="dashboard.html" class="flex flex-col items-center gap-1 text-slate-400"><span class="material-symbols-outlined">dashboard</span><span class="text-[10px] font-medium">Dashboard</span></a>
        <a href="jobs.html" class="flex flex-col items-center gap-1 text-slate-400"><span class="material-symbols-outlined">work</span><span class="text-[10px] font-medium">Jobs</span></a>
        <a href="applications.html" class="flex flex-col items-center gap-1 text-primary"><span class="material-symbols-outlined font-fill-1">assignment_turned_in</span><span class="text-[10px] font-bold">Applied</span></a>
        <a href="profile.html" class="flex flex-col items-center gap-1 text-slate-400"><span class="material-symbols-outlined">person</span><span class="text-[10px] font-medium">Profile</span></a>
    </nav>

    <!-- Desktop Sidebar -->
    <aside class="hidden md:flex fixed inset-y-0 left-0 w-72 bg-white border-r border-slate-200 flex-col z-40">
        <div class="p-8"><div class="flex items-center gap-3"><div class="w-10 h-10 bg-primary rounded-xl flex items-center justify-center text-white"><span class="material-symbols-outlined">school</span></div><span class="text-xl font-bold tracking-tight text-primary">CampusDrive</span></div></div>
        <nav class="flex-1 px-4 space-y-1">
            <a href="dashboard.html" class="sidebar-link"><span class="material-symbols-outlined">dashboard</span><span class="font-semibold">Dashboard</span></a>
            <a href="jobs.html" class="sidebar-link"><span class="material-symbols-outlined">work</span><span class="font-semibold">Job Listings</span></a>
            <a href="applications.html" class="sidebar-link active"><span class="material-symbols-outlined">fact_check</span><span class="font-semibold">My Applications</span></a>
            <a href="profile.html" class="sidebar-link"><span class="material-symbols-outlined">account_circle</span><span class="font-semibold">Career Profile</span></a>
        </nav>
    </aside>

    <div class="md:ml-72 min-h-screen pb-20 md:pb-0">
        <header class="sticky top-0 z-30 bg-white/80 backdrop-blur-md border-b border-slate-200 px-6 py-4 flex items-center justify-between">
            <h1 class="text-xl font-bold text-slate-900">Track Applications</h1>
            <div class="w-10 h-10 rounded-full overflow-hidden border border-slate-200"><img src="https://i.pravatar.cc/100?u=arjun" alt="Profile" class="w-full h-full object-cover"></div>
        </header>

        <main class="p-6 md:p-10 max-w-5xl mx-auto animate-fade-in">
            <div class="flex items-center justify-between mb-8">
                <div class="flex gap-4">
                    <button id="active-count" class="px-6 py-2 bg-primary text-white rounded-full text-sm font-bold shadow-lg shadow-slate-200">Active (0)</button>
                    <button class="px-6 py-2 bg-white text-slate-500 border border-slate-200 rounded-full text-sm font-bold hover:bg-slate-50 transition-all">Past (45)</button>
                </div>
            </div>

            <div id="applications-list-container" class="space-y-6">
                <!-- Applications will be loaded here -->
            </div>
        </main>
    </div>
    <script src="js/api.js"></script>
    <script>
        async function loadApplications() {
            try {
                const applications = await api.getApplications();
                const jobs = await api.getJobs();
                const container = document.getElementById('applications-list-container');
                container.innerHTML = '';

                if (applications.length === 0) {
                    container.innerHTML = '<div class="text-center py-20 bg-white rounded-3xl border border-slate-200 text-slate-500">You haven\'t applied to any jobs yet.</div>';
                    return;
                }

                applications.forEach(app => {
                    const job = jobs.find(j => j.id === app.job_id) || { company_name: 'Unknown', role: 'Unknown' };
                    const statusClass = app.status === 'Rejected' ? 'bg-red-50 text-red-600 border-red-100' : 
                                      app.status === 'Selected' ? 'bg-green-50 text-green-600 border-green-100' :
                                      app.status === 'Shortlisted' ? 'bg-blue-50 text-blue-600 border-blue-100' : 
                                      'bg-amber-50 text-amber-600 border-amber-100';

                    const card = `
                        <div class="bg-white rounded-3xl border border-slate-200 shadow-sm overflow-hidden group hover:shadow-md transition-all">
                            <div class="p-6 sm:p-8 flex flex-col sm:flex-row gap-6 items-start sm:items-center">
                                <div class="w-16 h-16 bg-slate-50 rounded-2xl flex items-center justify-center border border-slate-100 shrink-0">
                                    <img src="https://ui-avatars.com/api/?name=${job.company_name}&background=random" alt="${job.company_name}" class="w-10 h-10 object-contain rounded-lg">
                                </div>
                                <div class="flex-grow">
                                    <h3 class="text-xl font-bold text-slate-900 mb-1">${job.role}</h3>
                                    <p class="font-semibold text-slate-500 mb-4">${job.company_name} • Applied on ${new Date(app.applied_at).toLocaleDateString()}</p>
                                    <div class="flex flex-wrap gap-3">
                                        <span class="px-3 py-1 ${statusClass} text-xs font-bold rounded-full border flex items-center gap-1.5">
                                            <span class="w-1.5 h-1.5 rounded-full bg-current"></span> ${app.status}
                                        </span>
                                    </div>
                                </div>
                                <div class="w-full sm:w-auto flex flex-col gap-2 shrink-0">
                                    <button onclick="window.location.href='job-details.html?id=${app.job_id}'" class="w-full px-6 py-3 bg-primary text-white rounded-xl text-sm font-bold hover:opacity-90 transition-all">View Job</button>
                                </div>
                            </div>
                        </div>
                    `;
                    container.insertAdjacentHTML('beforeend', card);
                });

                document.getElementById('active-count').textContent = `Active (${applications.length})`;

            } catch (error) {
                console.error('Error loading applications:', error);
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            if (!api.getToken()) {
                window.location.href = 'index.html';
                return;
            }
            loadApplications();
        });
    </script>
</body>
</html>
