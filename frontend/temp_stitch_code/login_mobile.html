<body class="flex items-center justify-center min-h-screen bg-background p-md">
<main class="w-full max-w-[440px]">
<div class="bg-surface-container-lowest login-card border border-outline-variant rounded-xl p-xl flex flex-col items-center">
<header class="text-center mb-xl">

<span class="material-symbols-outlined text-on-primary" data-icon="school">school</span>
</div>
<h1 class="font-headline-md text-headline-md text-primary tracking-tight">Placement Portal</h1>
<p class="font-body-sm text-body-sm text-on-surface-variant mt-xs">Access your professional future</p>
</header>
<form class="w-full space-y-lg">
<div class="space-y-sm">
<label class="block font-label-caps text-label-caps text-on-surface-variant" for="email">EMAIL ADDRESS</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline text-[20px]" data-icon="mail">mail</span>
<input class="w-full pl-10 pr-md py-3 border border-outline-variant rounded-lg font-body-md text-body-md focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all placeholder:text-outline-variant" id="email" placeholder="name@university.edu" required="" type="email"/>
</div>
</div>
<div class="space-y-sm">
<div class="flex justify-between items-center">
<label class="block font-label-caps text-label-caps text-on-surface-variant" for="password">PASSWORD</label>
<a class="font-label-caps text-label-caps text-primary hover:underline" href="#">FORGOT?</a>
</div>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline text-[20px]" data-icon="lock">lock</span>
<input class="w-full pl-10 pr-md py-3 border border-outline-variant rounded-lg font-body-md text-body-md focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all placeholder:text-outline-variant" id="password" placeholder="••••••••" required="" type="password"/>
</div>
</div>
<div class="pt-sm">
<button class="w-full bg-primary text-on-primary font-title-sm text-title-sm py-3 rounded-lg hover:opacity-90 active:scale-[0.98] transition-all duration-200" type="submit">
                        Login
                    </button>
</div>
</form>
<footer class="mt-xl text-center space-y-md w-full">
<div class="relative flex items-center">
<div class="flex-grow border-t border-outline-variant"></div>
<span class="flex-shrink mx-4 font-label-caps text-label-caps text-outline">OR</span>
<div class="flex-grow border-t border-outline-variant"></div>
</div>
<div class="flex flex-col items-center gap-sm">
<p class="font-body-sm text-body-sm text-on-surface-variant">Don't have an account?</p>
<a class="font-title-sm text-body-md text-primary font-semibold hover:underline" href="#">
                        Create an account
                    </a>
</div>
</footer>
</div>
