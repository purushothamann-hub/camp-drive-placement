<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Drives | Placement Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../style.css">
    <script src="../js/auth-guard.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#002366',
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-[#F8FAFC]">
    <!-- Sidebar (Same as Dashboard) -->
    <aside class="fixed inset-y-0 left-0 w-72 bg-white border-r border-slate-200 hidden md:flex flex-col z-40">
        <div class="p-8">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-primary rounded-xl flex items-center justify-center text-white"><span class="material-symbols-outlined">school</span></div>
                <span class="text-xl font-black tracking-tighter text-primary uppercase">Placement Admin</span>
            </div>
        </div>
        <nav class="flex-1 px-4 space-y-1">
            <a href="dashboard.html" class="sidebar-link">
                <span class="material-symbols-outlined">dashboard</span>
                <span class="font-bold">Command Center</span>
            </a>
            <a href="manage-jobs.html" class="sidebar-link active">
                <span class="material-symbols-outlined">work</span>
                <span class="font-bold">Manage Drives</span>
            </a>
            <a href="applicants.html" class="sidebar-link">
                <span class="material-symbols-outlined">group</span>
                <span class="font-bold">Applicants List</span>
            </a>
            <a href="reports.html" class="sidebar-link">
                <span class="material-symbols-outlined">assessment</span>
                <span class="font-bold">Analytics Reports</span>
            </a>
        </nav>
    </aside>

    <div class="md:ml-72 min-h-screen">
        <header class="sticky top-0 z-30 bg-white/80 backdrop-blur-md border-b border-slate-200 px-6 py-4 flex items-center justify-between">
            <h1 class="text-xl font-black text-slate-900">Manage Placement Drives</h1>
            <a href="create-job.html" class="px-6 py-2.5 bg-primary text-white rounded-xl text-sm font-bold shadow-lg hover:opacity-90 transition-all flex items-center gap-2">
                <span class="material-symbols-outlined text-lg">add</span>
                Create New Drive
            </a>
        </header>

        <main class="p-6 md:p-10 max-w-7xl mx-auto animate-fade-in">
            <!-- Search & Filters -->
            <div class="flex flex-col md:flex-row gap-4 mb-8">
                <div class="relative flex-grow max-w-md">
                    <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400">search</span>
                    <input type="text" placeholder="Search by company or role..." class="w-full pl-12 pr-4 py-3 bg-white border border-slate-200 rounded-xl focus:ring-2 focus:ring-primary outline-none transition-all shadow-sm">
                </div>
                <div class="flex gap-2">
                    <select class="bg-white border border-slate-200 rounded-xl px-4 py-3 text-sm font-bold text-slate-600 focus:ring-2 focus:ring-primary outline-none shadow-sm">
                        <option>All Statuses</option>
                        <option>Active</option>
                        <option>Completed</option>
                        <option>Draft</option>
                    </select>
                    <button class="p-3 bg-white border border-slate-200 rounded-xl text-slate-600 hover:text-primary transition-all shadow-sm"><span class="material-symbols-outlined">filter_list</span></button>
                </div>
            </div>

            <div id="jobs-list-container" class="grid grid-cols-1 gap-4">
                <!-- Drives will be loaded here -->
            </div>
        </main>
    </div>
    <script src="../js/api.js"></script>
    <script>
        async function loadJobs() {
            try {
                const jobs = await api.adminGetJobs();
                const applicants = await api.adminGetAllApplicants();
                const container = document.getElementById('jobs-list-container');
                container.innerHTML = '';

                jobs.forEach(job => {
                    const jobApplicants = applicants.filter(a => a.job_id === job.id);
                    const deadline = new Date(job.deadline);
                    const isExpired = deadline < new Date();

                    const jobCard = `
                        <div class="card p-6 flex flex-col md:flex-row items-center gap-6 ${isExpired ? 'opacity-60' : ''}">
                            <div class="w-16 h-16 bg-slate-50 rounded-2xl flex items-center justify-center border border-slate-100 shrink-0">
                                <img src="https://ui-avatars.com/api/?name=${job.company_name}&background=random" class="w-10 h-10 object-contain rounded-lg">
                            </div>
                            <div class="flex-grow text-center md:text-left">
                                <div class="flex flex-wrap justify-center md:justify-start gap-2 mb-2">
                                    <span class="px-2 py-0.5 ${isExpired ? 'bg-slate-200 text-slate-500' : 'bg-green-50 text-green-700'} text-[10px] font-black rounded-full uppercase">${isExpired ? 'Completed' : 'Active Drive'}</span>
                                </div>
                                <h3 class="text-xl font-black text-slate-900 ${isExpired ? 'line-through text-slate-400' : ''}">${job.role}</h3>
                                <p class="text-sm font-semibold text-slate-500">${job.company_name} • Bengaluru</p>
                            </div>
                            <div class="flex gap-10 text-center shrink-0">
                                <div>
                                    <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Applicants</p>
                                    <p class="text-lg font-black text-slate-900">${jobApplicants.length}</p>
                                </div>
                                <div>
                                    <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Deadline</p>
                                    <p class="text-lg font-black text-slate-900">${deadline.toLocaleDateString(undefined, { day: 'numeric', month: 'short' })}</p>
                                </div>
                            </div>
                            <div class="flex gap-2 shrink-0 w-full md:w-auto mt-4 md:mt-0">
                                <button onclick="window.location.href='applicants.html?job_id=${job.id}'" class="flex-grow md:flex-grow-0 px-4 py-2.5 bg-primary text-white rounded-xl text-sm font-bold hover:opacity-90 transition-all">View Applicants</button>
                            </div>
                        </div>
                    `;
                    container.insertAdjacentHTML('beforeend', jobCard);
                });

            } catch (error) {
                console.error('Error loading jobs:', error);
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            if (!api.getToken()) {
                window.location.href = '../index.html';
                return;
            }
            loadJobs();
        });
    </script>
</body>
</html>
