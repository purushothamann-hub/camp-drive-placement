<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "background": "#faf8ff",
                    "surface-container-low": "#f4f3f9",
                    "inverse-on-surface": "#f1f0f6",
                    "on-secondary-fixed": "#1a1c1c",
                    "surface-container": "#efedf3",
                    "on-primary-fixed": "#00174a",
                    "on-primary-fixed-variant": "#2a4386",
                    "on-surface": "#1a1b20",
                    "secondary": "#5d5f5f",
                    "outline": "#757682",
                    "primary-fixed": "#dbe1ff",
                    "on-primary": "#ffffff",
                    "on-tertiary-fixed": "#390b00",
                    "on-background": "#1a1b20",
                    "surface-container-lowest": "#ffffff",
                    "on-secondary": "#ffffff",
                    "tertiary": "#2d0700",
                    "tertiary-container": "#501300",
                    "inverse-surface": "#2f3035",
                    "outline-variant": "#c5c6d2",
                    "inverse-primary": "#b3c5ff",
                    "on-secondary-container": "#5f6161",
                    "primary-container": "#002366",
                    "surface-dim": "#dad9e0",
                    "secondary-fixed": "#e2e2e2",
                    "on-tertiary": "#ffffff",
                    "primary": "#00113a",
                    "surface-tint": "#435b9f",
                    "on-surface-variant": "#444650",
                    "on-secondary-fixed-variant": "#454747",
                    "secondary-container": "#dcdddd",
                    "error": "#ba1a1a",
                    "surface-container-highest": "#e3e2e8",
                    "surface-container-high": "#e9e7ee",
                    "on-error-container": "#93000a",
                    "tertiary-fixed": "#ffdbd0",
                    "error-container": "#ffdad6",
                    "tertiary-fixed-dim": "#ffb59e",
                    "on-primary-container": "#758dd5",
                    "primary-fixed-dim": "#b3c5ff",
                    "on-tertiary-fixed-variant": "#783018",
                    "on-tertiary-container": "#d37758",
                    "secondary-fixed-dim": "#c6c6c7",
                    "surface-bright": "#faf8ff",
                    "surface-variant": "#e3e2e8",
                    "surface": "#faf8ff",
                    "on-error": "#ffffff"
            },
            "borderRadius": {
                    "DEFAULT": "0.125rem",
                    "lg": "0.25rem",
                    "xl": "0.5rem",
                    "full": "0.75rem"
            },
            "spacing": {
                    "md": "1.5rem",
                    "xs": "0.5rem",
                    "container-max": "1440px",
                    "lg": "2rem",
                    "xl": "3rem",
                    "sm": "1rem",
                    "base": "4px",
                    "gutter": "1.5rem"
            },
            "fontFamily": {
                    "label-caps": ["Inter"],
                    "status-badge": ["Inter"],
                    "body-md": ["Inter"],
                    "body-lg": ["Inter"],
                    "h1": ["Inter"],
                    "h2": ["Inter"],
                    "h3": ["Inter"]
            },
            "fontSize": {
                    "label-caps": ["12px", {"lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "600"}],
                    "status-badge": ["12px", {"lineHeight": "12px", "fontWeight": "500"}],
                    "body-md": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
                    "body-lg": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                    "h1": ["30px", {"lineHeight": "38px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                    "h2": ["24px", {"lineHeight": "32px", "letterSpacing": "-0.01em", "fontWeight": "600"}],
                    "h3": ["20px", {"lineHeight": "28px", "fontWeight": "600"}]
            }
          },
        },
      }
    </script>
<style>
        body {
            font-family: 'Inter', sans-serif;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface-container-lowest text-on-background min-h-screen flex flex-col">
<!-- TopAppBar suppressed for Transactional/Login screen per Shell Visibility & Relevance rule -->
<main class="flex-grow flex items-center justify-center px-sm">
<div class="w-full max-w-[440px] flex flex-col space-y-lg">
<!-- Branding Anchor -->
<div class="flex flex-col items-center space-y-xs">
<div class="w-12 h-12 bg-primary-container rounded-lg flex items-center justify-center mb-xs">
<span class="material-symbols-outlined text-on-primary-container text-3xl" data-icon="account_balance">account_balance</span>
</div>
<h1 class="font-h1 text-h1 text-primary text-center">Placement Admin</h1>
<p class="font-body-md text-body-md text-secondary text-center">Secure portal for institutional administration</p>
</div>
<!-- Login Card -->
<div class="bg-white p-xl border border-outline-variant shadow-sm">
<form class="space-y-md">
<!-- Email Input -->
<div class="flex flex-col space-y-base">
<label class="font-label-caps text-label-caps text-on-surface-variant" for="email">EMAIL ADDRESS</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline text-[20px]" data-icon="mail">mail</span>
<input class="w-full pl-10 pr-md py-3 bg-white border border-outline-variant focus:border-primary-container focus:ring-1 focus:ring-primary-container outline-none transition-all font-body-md text-body-md text-on-surface" id="email" name="email" placeholder="admin@university.edu" required="" type="email"/>
</div>
</div>
<!-- Password Input -->
<div class="flex flex-col space-y-base">
<div class="flex justify-between items-center">
<label class="font-label-caps text-label-caps text-on-surface-variant" for="password">PASSWORD</label>
<a class="font-label-caps text-label-caps text-primary hover:underline transition-all" href="#">FORGOT?</a>
</div>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline text-[20px]" data-icon="lock">lock</span>
<input class="w-full pl-10 pr-md py-3 bg-white border border-outline-variant focus:border-primary-container focus:ring-1 focus:ring-primary-container outline-none transition-all font-body-md text-body-md text-on-surface" id="password" name="password" placeholder="••••••••" required="" type="password"/>
</div>
</div>
<!-- Actions -->
<div class="pt-xs flex flex-col space-y-md">
<button class="w-full bg-primary-container text-on-primary-container py-3 px-md font-h3 text-h3 hover:bg-primary transition-colors cursor-pointer flex items-center justify-center space-x-xs" type="submit">
<span>Login</span>
<span class="material-symbols-outlined" data-icon="login">login</span>
</button>
<div class="flex items-center space-x-xs">
<input class="w-4 h-4 border-outline-variant rounded-sm text-primary focus:ring-primary-container" id="remember" type="checkbox"/>
<label class="font-body-md text-body-md text-secondary select-none" for="remember">Keep me logged in for 30 days</label>
</div>
</div>
</form>
</div>
<!-- Footer Meta -->
<div class="flex flex-col items-center space-y-md">
<div class="flex items-center space-x-sm">
<div class="h-px w-8 bg-outline-variant"></div>
<span class="font-label-caps text-label-caps text-outline">SECURE ENVIRONMENT</span>
<div class="h-px w-8 bg-outline-variant"></div>
</div>
<div class="grid grid-cols-3 gap-lg w-full max-w-[320px]">
<div class="flex flex-col items-center">
<span class="material-symbols-outlined text-outline mb-1" data-icon="security">security</span>
<span class="font-status-badge text-status-badge text-secondary">SSL Encrypted</span>
</div>
<div class="flex flex-col items-center">
<span class="material-symbols-outlined text-outline mb-1" data-icon="verified_user">verified_user</span>
<span class="font-status-badge text-status-badge text-secondary">Authorized Only</span>
</div>
<div class="flex flex-col items-center">
<span class="material-symbols-outlined text-outline mb-1" data-icon="history">history</span>
<span class="font-status-badge text-status-badge text-secondary">Audit Logs</span>
</div>
</div>
</div>
</div>
</main>
<!-- Support Footer -->
<footer class="p-lg flex justify-between items-center">
<div class="flex space-x-md">
<a class="font-body-md text-body-md text-secondary hover:text-primary transition-colors" href="#">Privacy Policy</a>
<a class="font-body-md text-body-md text-secondary hover:text-primary transition-colors" href="#">Technical Support</a>
</div>
<div class="flex items-center space-x-xs">
<span class="font-body-md text-body-md text-secondary">System Status:</span>
<div class="flex items-center space-x-1">
<div class="w-2 h-2 rounded-full bg-on-tertiary-container"></div>
<span class="font-status-badge text-status-badge text-on-tertiary-container">Operational</span>
</div>
</div>
</footer>
<!-- Background Decorative Elements -->
<div class="fixed top-0 right-0 w-1/3 h-full -z-10 opacity-10 pointer-events-none overflow-hidden">
<div class="absolute -top-24 -right-24 w-96 h-96 border border-primary rounded-full"></div>
<div class="absolute top-1/2 -right-48 w-80 h-80 border border-primary-container rounded-full opacity-50"></div>
</div>
<div class="fixed bottom-0 left-0 w-1/3 h-full -z-10 opacity-10 pointer-events-none overflow-hidden">
<div class="absolute -bottom-12 -left-12 w-64 h-64 border border-outline rounded-full"></div>
</div>
</body></html>
